name: Deploy to production (on demand)

# Ad-hoc, on-demand production deploy of the current `main`. Trigger from the Actions tab
# ("Run workflow") or with `gh workflow run deploy.yml`. For a versioned release, tag `v*.*.*`
# instead and let release.yml handle it. `main` never auto-deploys
# (vercel.json → git.deploymentEnabled.main: false); PR previews stay automatic.
on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-production.yml
    secrets: inherit

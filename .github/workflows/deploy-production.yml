name: Deploy production (reusable)

# The single source of truth for shipping to Vercel production. Called by:
#   - deploy.yml  (workflow_dispatch — ad-hoc, on-demand)
#   - release.yml (tag push v*.*.* — versioned release)
# Both callers gate this behind the `production` GitHub environment (approval) and share the
# `production-deploy` concurrency group so deploys never overlap. Checkout uses the caller's
# ref, so release.yml deploys the tagged commit and deploy.yml deploys main.
on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (production)
        # Runs vercel.json's buildCommand (deploy/vercel/build.sh) — static, no framework.
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to production
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to production: $url"

      - name: Summary
        run: echo "### Production deploy → ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
